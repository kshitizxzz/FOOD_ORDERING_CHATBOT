server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index home.html;

    location / {
        try_files $uri $uri/ /home.html;
    }

    # Inject runtime config via a small JS endpoint
    location /config.js {
        try_files /config.js =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/jpeg image/png;
}
